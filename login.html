<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUT Financial Hub — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0faf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1a7a4a, #0f5233);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: #0f2419;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      font-weight: 500;
      color: #5a8a6a;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #0f2419;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b8a75;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #4a7a5a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .phone-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .country-code {
      width: 80px;
      padding: 14px 10px;
      border: 1.5px solid #d4e8dc;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: #0f2419;
      background: #f7fdf9;
      text-align: center;
      flex-shrink: 0;
    }

    input[type="tel"] {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid #d4e8dc;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      color: #0f2419;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="tel"]:focus {
      border-color: #1a7a4a;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #1a7a4a;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { background: #155f3a; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: #a0c4b0; cursor: not-allowed; }

    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .divider {
      text-align: center;
      font-size: 13px;
      color: #9ab8a4;
      margin-bottom: 16px;
    }

    .trust-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #eaf3ec;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8aaa94;
      font-weight: 600;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">N·</div>
      <div class="logo-text">NUT <span>Financial Hub</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Enter your phone number to sign in to your NUT member account.</p>

    <label class="label">Phone number</label>
    <div class="phone-row">
      <div class="country-code">🇳🇬 +234</div>
      <input type="tel" id="phoneInput" placeholder="080 0000 0000" maxlength="11" />
    </div>

    <div class="error" id="errorBox"></div>

    <button class="btn" id="sendBtn" onclick="sendOTP()">
      <span id="btnText">Send verification code</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="divider">New member? Your branch officer will register you.</div>

    <div id="recaptcha-container"></div>

    <div class="trust-row">
      <div class="trust-item">🔒 CBN Licensed</div>
      <div class="trust-item">🛡️ NDIC Insured</div>
      <div class="trust-item">🔐 256-bit SSL</div>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase.js';
    import { RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.sendOTP = async function () {
      const phoneInput = document.getElementById('phoneInput').value.trim();
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('sendBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');

      // Hide previous errors
      errorBox.style.display = 'none';

      // Validate
      if (!phoneInput || phoneInput.length < 10) {
        errorBox.textContent = 'Please enter a valid Nigerian phone number.';
        errorBox.style.display = 'block';
        return;
      }

      // Format number
      let phone = phoneInput.replace(/\s/g, '');
      if (phone.startsWith('0')) phone = '+234' + phone.slice(1);
      if (!phone.startsWith('+234')) phone = '+234' + phone;

      // Show loading
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Sending...';

      try {
        // Setup reCAPTCHA
        if (!window.recaptchaVerifier) {
          window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            size: 'invisible',
            callback: () => {}
          });
        }

        const confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        window.confirmationResult = confirmationResult;

        // Save phone for OTP screen
        sessionStorage.setItem('nut_phone', phone);

        // Go to OTP screen
        window.location.href = 'otp.html';

      } catch (err) {
        console.error(err);
        errorBox.textContent = 'Could not send code. Check your number and try again.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Send verification code';
      }
    };
  </script>

</body>
</html>

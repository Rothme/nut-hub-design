<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUT Financial Hub — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0faf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.06);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #4a7a5a;
      cursor: pointer;
      margin-bottom: 24px;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      text-decoration: none;
    }

    .back-btn:hover { color: #1a7a4a; }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1a7a4a, #0f5233);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: #0f2419;
      letter-spacing: -0.02em;
    }

    .logo-text span { font-weight: 500; color: #5a8a6a; }

    .test-banner {
      background: #fff8e6;
      border: 1px solid #f5d98a;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 24px;
      font-size: 12px;
      color: #a07020;
      font-weight: 600;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.5;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #0f2419;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b8a75;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #4a7a5a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .field { margin-bottom: 16px; }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d4e8dc;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      color: #0f2419;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1a7a4a; }
    input::placeholder { color: #b0caba; }

    .forgot {
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: #1a7a4a;
      cursor: pointer;
      margin-top: -8px;
      margin-bottom: 20px;
    }

    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #1a7a4a;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { background: #155f3a; }
    .btn:disabled { background: #a0c4b0; cursor: not-allowed; }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #7aaa8a;
      margin-bottom: 24px;
    }

    .signup-link a {
      color: #1a7a4a;
      font-weight: 700;
      text-decoration: none;
    }

    .trust-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 20px;
      border-top: 1px solid #eaf3ec;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8aaa94;
      font-weight: 600;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <a class="back-btn" href="index.html">← Back to home</a>

    <div class="logo">
      <div class="logo-icon">N·</div>
      <div class="logo-text">NUT <span>Financial Hub</span></div>
    </div>

    <div class="test-banner">
      ⚠️ Testing mode — sign in with the email and password created for your test account.
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your NUT member account.</p>

    <div class="field">
      <label class="label">Email address</label>
      <input type="email" id="emailInput" placeholder="e.g. adaeze@gmail.com" />
    </div>

    <div class="field">
      <label class="label">Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" />
    </div>

    <div class="forgot">Forgot password?</div>

    <div class="error" id="errorBox"></div>

    <button class="btn" id="loginBtn" onclick="loginUser()">
      <span id="btnText">Sign in</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="signup-link">
      New member? <a href="signup.html">Create an account</a>
    </div>

    <div class="trust-row">
      <div class="trust-item">🔒 CBN Licensed</div>
      <div class="trust-item">🛡️ NDIC Insured</div>
      <div class="trust-item">🔐 256-bit SSL</div>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.loginUser = async function () {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');

      errorBox.style.display = 'none';

      if (!email) {
        errorBox.textContent = 'Please enter your email address.';
        errorBox.style.display = 'block';
        return;
      }

      if (!password) {
        errorBox.textContent = 'Please enter your password.';
        errorBox.style.display = 'block';
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Signing in...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error(err);
        errorBox.textContent = 'Incorrect email or password. Please try again.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Sign in';
      }
    };
  </script>

</body>
</html>
